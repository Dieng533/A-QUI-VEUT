<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>A QUI VEUT ? - Redirection</title>
  <meta http-equiv="refresh" content="0; url=/build/web/">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .loader {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #3498db;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 2s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>A QUI VEUT ?</h1>
  <p>Application mobile de santé pour le Sénégal</p>
  <div class="loader"></div>
  <p>Redirection vers l'application...</p>
  <p><small>Si la redirection ne fonctionne pas, <a href="/build/web/" style="color: white;">cliquez ici</a></small></p>
</body>
</html>
