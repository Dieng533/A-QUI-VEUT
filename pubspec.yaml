name: a_qui_veut
description: Application mobile de santé "A QUI VEUT ?" - Votre santé, plus proche de vous

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  lottie: ^2.7.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Navigation & State Management
  go_router: ^12.1.3
  provider: ^6.1.1

  # Maps & Location
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0
  permission_handler: ^11.0.1

  # HTTP & API
  dio: ^5.3.2
  shared_preferences: ^2.2.2

  # Local Storage
  sqflite: ^2.3.0
  path: ^1.8.3

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  connectivity_plus: ^5.0.1

  # Animations
  animate_do: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets will be added when directories exist
  # assets:
  #   - assets/images/
  #   - assets/animations/
  #   - assets/icons/

  # Fonts will be added when font files are downloaded
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
